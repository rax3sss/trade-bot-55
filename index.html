<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Торговый бот | Марат Крестов</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e17;
            color: #e5e9f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: #121927;
            border-radius: 20px;
            padding: 24px 20px 30px;
            border: 1px solid #1a2a3f;
        }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 20px; font-weight: 700; color: #00d4ff; }
        .header p { font-size: 12px; color: #7a8aa8; margin-top: 2px; }

        .lang-row {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .lang-btn {
            padding: 4px 12px;
            background: transparent;
            border: 1px solid #1a2a3f;
            border-radius: 6px;
            color: #7a8aa8;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .lang-btn.active { border-color: #00d4ff; color: #fff; background: #00d4ff; }
        .lang-btn:hover { border-color: #00d4ff; }

        .label { font-size: 13px; color: #7a8aa8; margin-bottom: 6px; display: block; font-weight: 600; }

        .pair-selector {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
            max-height: 150px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .pair-selector::-webkit-scrollbar { width: 3px; }
        .pair-selector::-webkit-scrollbar-track { background: #0a0e17; }
        .pair-selector::-webkit-scrollbar-thumb { background: #00d4ff; border-radius: 10px; }
        .pair-btn {
            padding: 10px 14px;
            background: #0a0e17;
            border: 1px solid #1a2a3f;
            border-radius: 10px;
            color: #7a8aa8;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            text-align: left;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .pair-btn.active { background: #00d4ff; color: #0a0e17; border-color: #00d4ff; }
        .pair-btn:hover { border-color: #00d4ff; }
        .pair-btn .timer-status {
            font-size: 11px;
            color: #ffa500;
            font-weight: 700;
        }
        .pair-btn .timer-status.ready { color: #00d4aa; }
        .pair-btn .timer-status.trading { color: #ffa500; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .timeframe-row {
            display: flex;
            gap: 6px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .tf-btn {
            padding: 6px 10px;
            background: #0a0e17;
            border: 1px solid #1a2a3f;
            border-radius: 8px;
            color: #7a8aa8;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            flex: 1;
            min-width: 44px;
            text-align: center;
        }
        .tf-btn.active { background: #00d4ff; color: #0a0e17; border-color: #00d4ff; }
        .tf-btn:hover { border-color: #00d4ff; }

        .signal-card {
            background: #0a0e17;
            border-radius: 16px;
            padding: 20px 16px;
            border: 1px solid #1a2a3f;
            margin-bottom: 16px;
            text-align: center;
        }
        .signal-card .pair-name { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
        .signal-card .pair-name small { font-size: 12px; color: #7a8aa8; font-weight: 400; }

        .signal-card .badge {
            display: inline-block;
            padding: 8px 24px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 800;
            text-transform: uppercase;
            margin: 6px 0 10px;
            letter-spacing: 1px;
        }
        .badge.waiting { background: rgba(255,255,255,0.05); color: #7a8aa8; border: 1px solid #1a2a3f; }
        .badge.buy { background: rgba(0, 212, 170, 0.2); color: #00d4aa; border: 2px solid #00d4aa; box-shadow: 0 0 40px rgba(0, 212, 170, 0.3); }
        .badge.sell { background: rgba(255, 71, 87, 0.2); color: #ff4757; border: 2px solid #ff4757; box-shadow: 0 0 40px rgba(255, 71, 87, 0.3); }

        .signal-direction { font-size: 48px; padding: 4px 0; }
        .signal-direction.buy { color: #00d4aa; }
        .signal-direction.sell { color: #ff4757; }

        .signal-details {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
        }
        .signal-details .item { display: flex; flex-direction: column; align-items: center; }
        .signal-details .item .label { font-size: 9px; color: #6a7a8a; text-transform: uppercase; letter-spacing: 0.5px; }
        .signal-details .item .value { font-size: 15px; font-weight: 700; margin-top: 2px; }
        .signal-details .item .value.buy { color: #00d4aa; }
        .signal-details .item .value.sell { color: #ff4757; }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-primary:active { transform: scale(0.97); }
        .btn-primary:disabled { opacity: 0.4; transform: none; cursor: not-allowed; }

        .timer-display {
            font-size: 24px;
            font-weight: 700;
            color: #ffa500;
            padding: 4px 0;
            letter-spacing: 2px;
        }

        @media (max-width: 480px) {
            .container { padding: 16px 14px 20px; }
            .header h1 { font-size: 17px; }
            .signal-card .pair-name { font-size: 18px; }
            .signal-direction { font-size: 38px; }
            .signal-card .badge { font-size: 15px; padding: 6px 18px; }
        }
    </style>
</head>
<body>
    <div class="container">

        <div class="header">
            <h1>🚀 TRADE SIGNAL</h1>
            <p>by MARAT KRESTOV</p>
        </div>

        <div class="lang-row">
            <button class="lang-btn active" data-lang="ru" onclick="setLang('ru')">РУ</button>
            <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
            <button class="lang-btn" data-lang="uk" onclick="setLang('uk')">UA</button>
            <button class="lang-btn" data-lang="kz" onclick="setLang('kz')">KZ</button>
        </div>

        <span class="label" id="lblInstrument">📊 Инструмент</span>
        <div class="pair-selector" id="pairSelector"></div>

        <span class="label" id="lblTimeframe">⏳ Время</span>
        <div class="timeframe-row" id="timeframeRow">
            <button class="tf-btn" data-tf="5с">5с</button>
            <button class="tf-btn" data-tf="1м">1м</button>
            <button class="tf-btn active" data-tf="5м">5м</button>
            <button class="tf-btn" data-tf="15м">15м</button>
            <button class="tf-btn" data-tf="30м">30м</button>
            <button class="tf-btn" data-tf="1ч">1ч</button>
        </div>

        <div class="signal-card" id="signalCard">
            <div class="pair-name" id="currentPair">EUR/USD <small>Forex</small></div>
            <div class="badge waiting" id="signalBadge">⏳ Ожидание</div>
            <div class="signal-direction" id="signalDirection">⟷</div>
            <div class="timer-display" id="timerDisplay" style="display:none;">⏱️ 00:00</div>
            <div class="signal-details">
                <div class="item">
                    <span class="label" id="lblTF">Таймфрейм</span>
                    <span class="value" id="displayTF">5м</span>
                </div>
                <div class="item">
                    <span class="label" id="lblAccuracy">Точность</span>
                    <span class="value" id="displayAccuracy">—</span>
                </div>
                <div class="item">
                    <span class="label" id="lblTime">До</span>
                    <span class="value" id="displayTime">—</span>
                </div>
            </div>
        </div>

        <button class="btn-primary" id="getSignalBtn">💎 ПОКУПАТЬ СИГНАЛ</button>

    </div>

    <script>
        // ============================================================
        //  ЯЗЫКИ
        // ============================================================
        const LANGUAGES = {
            'ru': { instrument: '📊 Инструмент', timeframe: '⏳ Время', wait: '⏳ Ожидание', buy: '📈 КУПИТЬ', sell: '📉 ПРОДАТЬ', tf: 'Таймфрейм', accuracy: 'Точность', time: 'До', getSignal: '💎 ПОКУПАТЬ СИГНАЛ', generating: '⚡ ГЕНЕРАЦИЯ...', timer: '⏱️ ТАЙМЕР', active: 'Активна', free: 'Свободна' },
            'en': { instrument: '📊 Instrument', timeframe: '⏳ Time', wait: '⏳ Waiting', buy: '📈 BUY', sell: '📉 SELL', tf: 'Timeframe', accuracy: 'Accuracy', time: 'Until', getSignal: '💎 BUY SIGNAL', generating: '⚡ GENERATING...', timer: '⏱️ TIMER', active: 'Active', free: 'Free' },
            'uk': { instrument: '📊 Інструмент', timeframe: '⏳ Час', wait: '⏳ Очікування', buy: '📈 КУПИТИ', sell: '📉 ПРОДАТИ', tf: 'Таймфрейм', accuracy: 'Точність', time: 'До', getSignal: '💎 КУПИТИ СИГНАЛ', generating: '⚡ ГЕНЕРАЦІЯ...', timer: '⏱️ ТАЙМЕР', active: 'Активна', free: 'Вільна' },
            'kz': { instrument: '📊 Құрал', timeframe: '⏳ Уақыт', wait: '⏳ Күту', buy: '📈 САТЫП АЛУ', sell: '📉 САТУ', tf: 'Уақыт аралығы', accuracy: 'Дәлдік', time: 'Дейін', getSignal: '💎 СИГНАЛ САТЫП АЛУ', generating: '⚡ ЖАСАЛУДА...', timer: '⏱️ ТАЙМЕР', active: 'Белсенді', free: 'Бос' }
        };

        let currentLang = 'ru';
        function t(key) { return LANGUAGES[currentLang][key] || key; }
        function setLang(lang) {
            if (!LANGUAGES[lang]) return;
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
            updateUI();
            renderPairs();
        }

        // ============================================================
        //  ВСЕ ВАЛЮТНЫЕ ПАРЫ
        // ============================================================
        const PAIRS = [
            'EUR/USD', 'GBP/USD', 'USD/JPY', 'AUD/USD', 'USD/CAD',
            'EUR/GBP', 'EUR/JPY', 'GBP/JPY', 'USD/CHF', 'NZD/USD',
            'EUR/AUD', 'GBP/AUD', 'AUD/JPY', 'CAD/JPY', 'CHF/JPY',
            'EUR/CAD', 'GBP/CHF', 'AUD/CAD', 'NZD/JPY', 'USD/SEK',
            'EUR/CHF', 'GBP/NZD', 'AUD/NZD', 'CAD/CHF', 'EUR/NZD',
            'USD/NOK', 'USD/DKK', 'USD/SGD', 'USD/HKD', 'USD/MXN'
        ];

        // ============================================================
        //  ХРАНИЛИЩЕ ТАЙМЕРОВ ПО ПАРАМ
        // ============================================================
        let pairTimers = {};
        PAIRS.forEach(p => {
            pairTimers[p] = {
                isWaiting: false,
                isTradeOpen: false,
                timerInterval: null,
                timerSeconds: 0,
                signal: null,
                tf: '5м'
            };
        });

        // ============================================================
        //  ТЕКУЩЕЕ СОСТОЯНИЕ
        // ============================================================
        let state = {
            pair: 'EUR/USD',
            tf: '5м'
        };

        // ============================================================
        //  DOM
        // ============================================================
        const pairSelector = document.getElementById('pairSelector');
        const tfBtns = document.querySelectorAll('.tf-btn');
        const currentPair = document.getElementById('currentPair');
        const signalBadge = document.getElementById('signalBadge');
        const signalDirection = document.getElementById('signalDirection');
        const timerDisplay = document.getElementById('timerDisplay');
        const displayTF = document.getElementById('displayTF');
        const displayAccuracy = document.getElementById('displayAccuracy');
        const displayTime = document.getElementById('displayTime');
        const getSignalBtn = document.getElementById('getSignalBtn');

        // ============================================================
        //  РЕНДЕР ПАР
        // ============================================================
        function renderPairs() {
            pairSelector.innerHTML = '';
            PAIRS.forEach(p => {
                const btn = document.createElement('button');
                btn.className = `pair-btn ${p === state.pair ? 'active' : ''}`;
                btn.dataset.pair = p;

                const timer = pairTimers[p];
                const statusText = timer.isTradeOpen ? t('active') : t('free');
                const statusClass = timer.isTradeOpen ? 'trading' : 'ready';

                btn.innerHTML = `
                    ${p}
                    <span class="timer-status ${statusClass}">
                        ${timer.isTradeOpen ? '⏱️' : '✅'} ${statusText}
                    </span>
                `;

                btn.addEventListener('click', () => selectPair(p));
                pairSelector.appendChild(btn);
            });
        }

        function selectPair(pair) {
            state.pair = pair;
            renderPairs();
            updateSignalDisplay();
        }

        // ============================================================
        //  ТАЙМФРЕЙМ
        // ============================================================
        tfBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                tfBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.tf = btn.dataset.tf;
                displayTF.textContent = state.tf;
                // Сохраняем таймфрейм для текущей пары
                pairTimers[state.pair].tf = state.tf;
                updateSignalDisplay();
            });
        });

        // ============================================================
        //  ОБНОВЛЕНИЕ ДИСПЛЕЯ
        // ============================================================
        function updateSignalDisplay() {
            const timer = pairTimers[state.pair];
            currentPair.innerHTML = `${state.pair} <small>Forex</small>`;
            displayTF.textContent = timer.tf || state.tf;

            if (timer.isTradeOpen && timer.signal) {
                const isBuy = timer.signal.isBuy;
                signalBadge.className = `badge ${isBuy ? 'buy' : 'sell'}`;
                signalBadge.textContent = isBuy ? t('buy') : t('sell');
                signalDirection.textContent = isBuy ? '↗' : '↘';
                signalDirection.className = `signal-direction ${isBuy ? 'buy' : 'sell'}`;
                displayAccuracy.textContent = timer.signal.accuracy + '%';
                displayTime.textContent = timer.signal.time;

                if (timer.timerInterval) {
                    timerDisplay.style.display = 'block';
                    timerDisplay.textContent = `⏱️ ${formatTime(timer.timerSeconds)}`;
                } else {
                    timerDisplay.style.display = 'none';
                }
                getSignalBtn.disabled = true;
                getSignalBtn.textContent = t('timer');
            } else {
                signalBadge.className = 'badge waiting';
                signalBadge.textContent = t('wait');
                signalDirection.textContent = '⟷';
                signalDirection.className = 'signal-direction';
                displayAccuracy.textContent = '—';
                displayTime.textContent = '—';
                timerDisplay.style.display = 'none';
                getSignalBtn.disabled = false;
                getSignalBtn.textContent = t('getSignal');
            }
        }

        // ============================================================
        //  ТАЙМЕР
        // ============================================================
        function startTimerForPair(pair, seconds, callback) {
            const timer = pairTimers[pair];
            timer.timerSeconds = seconds;
            timer.timerInterval = setInterval(() => {
                timer.timerSeconds--;
                if (timer.timerSeconds <= 0) {
                    clearInterval(timer.timerInterval);
                    timer.timerInterval = null;
                    callback();
                }
                // Обновляем дисплей, если эта пара активна
                if (state.pair === pair) {
                    updateSignalDisplay();
                }
                // Обновляем статус в списке
                renderPairs();
            }, 1000);
            renderPairs();
        }

        function formatTime(seconds) {
            const m = String(Math.floor(seconds / 60)).padStart(2, '0');
            const s = String(seconds % 60).padStart(2, '0');
            return `${m}:${s}`;
        }

        // ============================================================
        //  ГЕНЕРАЦИЯ СИГНАЛА
        // ============================================================
        function generateSignal(pair, tf) {
            const isBuy = Math.random() > 0.4;
            const accuracy = Math.floor(Math.random() * 25) + 70;
            const time = new Date();
            time.setMinutes(time.getMinutes() + Math.floor(Math.random() * 10) + 3);
            const timeStr = time.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });

            return { pair, tf, isBuy, accuracy, time: timeStr };
        }

        // ============================================================
        //  ПОЛУЧИТЬ СИГНАЛ
        // ============================================================
        getSignalBtn.addEventListener('click', () => {
            const pair = state.pair;
            const timer = pairTimers[pair];

            if (timer.isWaiting || timer.isTradeOpen) return;

            timer.isWaiting = true;
            timer.isTradeOpen = true;
            getSignalBtn.disabled = true;
            getSignalBtn.textContent = t('generating');

            const signal = generateSignal(pair, timer.tf || state.tf);
            timer.signal = signal;
            showSignalForPair(pair);

            let seconds = 5;
            const tf = timer.tf || state.tf;
            if (tf === '1м') seconds = 60;
            else if (tf === '5м') seconds = 300;
            else if (tf === '15м') seconds = 900;
            else if (tf === '30м') seconds = 1800;
            else if (tf === '1ч') seconds = 3600;

            startTimerForPair(pair, seconds, () => {
                timer.isWaiting = false;
                timer.isTradeOpen = false;
                timer.signal = null;
                if (state.pair === pair) {
                    updateSignalDisplay();
                }
                renderPairs();
            });

            renderPairs();
        });

        function showSignalForPair(pair) {
            if (state.pair === pair) {
                updateSignalDisplay();
            }
            renderPairs();
        }

        // ============================================================
        //  ОБНОВЛЕНИЕ UI
        // ============================================================
        function updateUI() {
            document.getElementById('lblInstrument').textContent = t('instrument');
            document.getElementById('lblTimeframe').textContent = t('timeframe');
            document.getElementById('lblTF').textContent = t('tf');
            document.getElementById('lblAccuracy').textContent = t('accuracy');
            document.getElementById('lblTime').textContent = t('time');
        }

        // ============================================================
        //  ИНИЦИАЛИЗАЦИЯ
        // ============================================================
        renderPairs();
        currentPair.innerHTML = `${state.pair} <small>Forex</small>`;
        displayTF.textContent = state.tf;
        updateUI();
        updateSignalDisplay();

        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.expand();
            tg.ready();
        }

        console.log('✅ Mini App загружена');
    </script>
</body>
</html>
